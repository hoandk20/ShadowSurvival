<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Survivors</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        #debug-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            z-index: 1000;
            text-align: left;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
            min-width: 150px;
            max-height: calc(100vh - 20px);
            overflow-y: auto;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        #debug-panel.collapsed {
            min-width: 0;
            padding: 8px;
            gap: 0;
            overflow: hidden;
        }
        .debug-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .debug-panel-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #ffde85;
        }
        .debug-panel-toggle {
            background: rgba(255, 204, 0, 0.16);
            border: 1px solid rgba(255, 204, 0, 0.5);
            border-radius: 4px;
            color: #fff;
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .debug-panel-toggle:hover {
            background: rgba(255, 204, 0, 0.28);
        }
        #debug-panel.collapsed .panel-section {
            display: none;
        }
        #debug-panel::-webkit-scrollbar {
            width: 8px;
        }
        #debug-panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
        }
        #debug-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 204, 0, 0.65);
            border-radius: 999px;
        }
        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .panel-title {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }
        .panel-list label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .panel-list input[type="radio"],
        .panel-list input[type="checkbox"] {
            accent-color: #ffcc00;
        }
        #clear-enemies-btn {
            margin-top: 6px;
            background: #ff5555;
            border: none;
            border-radius: 4px;
            color: #fff;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        #clear-enemies-btn:hover {
            background: #ff7777;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="debug-panel">
        <div class="debug-panel-header">
            <div class="debug-panel-label">Debug</div>
            <button id="debug-panel-toggle" class="debug-panel-toggle" type="button">Hide</button>
        </div>
        <div class="panel-section">
            <div class="panel-title">Skills</div>
            <div id="skill-list"></div>
        </div>
        <div class="panel-section">
            <div class="panel-title">Enemies</div>
            <div id="enemy-list"></div>
            <button id="clear-enemies-btn">Clear Enemies</button>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
